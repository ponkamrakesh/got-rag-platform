name: Citadel Ingestion & Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'data/pdfs/**'
      - 'scripts/**'
      - 'eval/**'
      - '.github/workflows/**'
      - 'scripts/requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Check if ingestion is needed
        id: state
        env:
          GITHUB_OUTPUT: ${{ github.output }}
        run: python scripts/check_ingestion_needed.py

      - name: Run full ingestion pipeline
        if: steps.state.outputs.needed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ vars.PINECONE_INDEX_NAME || 'got-rag' }}
        run: python scripts/run_all.py

      - name: Commit & push artifacts
        if: steps.state.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/extracted/ eval/results.json data/.ingestion_state.json
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "ci: auto-ingest lore, maps & eval metrics [skip ci]"
            git push
          fi
