name: Citadel Ingestion & Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'data/pdfs/**'
      - 'scripts/**'
      - 'eval/**'
      - '.github/workflows/**'
      - 'scripts/requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: ${{ vars.PINECONE_INDEX_NAME || 'got-rag-platform' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Verify API keys are present
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then echo "❌ OPENAI_API_KEY is empty"; exit 1; else echo "✅ OPENAI_API_KEY is set"; fi
          if [ -z "$PINECONE_API_KEY" ]; then echo "❌ PINECONE_API_KEY is empty"; exit 1; else echo "✅ PINECONE_API_KEY is set"; fi
          echo "✅ PINECONE_INDEX_NAME=$PINECONE_INDEX_NAME"

      - name: Check if ingestion is needed
        id: state
        run: python scripts/check_ingestion_needed.py

      - name: Diagnostic — Show check result
        run: |
          echo "needed=${{ steps.state.outputs.needed }}"
          echo "--- PDFs ---"
          ls -la data/pdfs/ || echo "❌ No PDF dir"
          echo "--- Existing extracted ---"
          ls -la public/extracted/ 2>/dev/null || echo "⚠️  No extracted dir yet (expected)"

      - name: Setup Pinecone index
        if: steps.state.outputs.needed == 'true'
        run: python scripts/04_setup_pinecone.py

      - name: Parse PDFs (text + images)
        if: steps.state.outputs.needed == 'true'
        run: python scripts/01_parse_pdfs.py

      - name: Diagnostic — Check parsed output
        if: steps.state.outputs.needed == 'true'
        run: |
          echo "--- processed ---"
          ls -la data/processed/ || echo "❌ No processed dir"
          echo "--- extracted ---"
          ls -la public/extracted/ || echo "❌ No extracted dir"
          find public/extracted/ -type f | head -10 || echo "⚠️  No image files extracted"

      - name: Describe images with Vision AI
        if: steps.state.outputs.needed == 'true'
        run: python scripts/02_describe_images.py
        continue-on-error: true

      - name: Chunk, embed & upsert to Pinecone
        if: steps.state.outputs.needed == 'true'
        run: python scripts/03_chunk_embed_upsert.py

      - name: Run evaluation suite
        if: steps.state.outputs.needed == 'true'
        run: python scripts/run_eval.py
        continue-on-error: true

      - name: Write ingestion state (only on success)
        if: steps.state.outputs.needed == 'true'
        run: python scripts/write_ingestion_state.py

      - name: Diagnostic — Final artifact listing
        if: always() && steps.state.outputs.needed == 'true'
        run: |
          echo "=== PROCESSED ==="
          ls -la data/processed/ 2>/dev/null || true
          echo "=== EXTRACTED ==="
          find public/extracted/ -type f 2>/dev/null | wc -l || true
          echo "=== EVAL ==="
          ls -la eval/ 2>/dev/null || true
          echo "=== STATE ==="
          ls -la data/.ingestion_state.json 2>/dev/null || true

      - name: Commit & push artifacts
        if: always() && steps.state.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p public/extracted eval data
          git add public/extracted/ eval/results.json data/.ingestion_state.json

          if git diff --cached --quiet; then
            echo "🟡 No artifact changes to commit."
          else
            git commit -m "ci: auto-ingest lore, maps & eval metrics [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
