name: Citadel Ingestion & Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'data/pdfs/**'
      - 'scripts/**'
      - 'eval/**'
      - '.github/workflows/**'
      - 'scripts/requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: ${{ vars.PINECONE_INDEX_NAME || 'got-rag-platform' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          echo "=== INSTALLED PACKAGES ==="
          pip list | grep -i -E "pinecone|openai|fitz|google|pillow|numpy|pandas|tqdm"

      - name: Verify API keys are present
        run: |
          if [ -z "$JINA_API_KEY" ]; then echo "❌ JINA_API_KEY is empty"; else echo "✅ JINA_API_KEY set (len=${#JINA_API_KEY})"; fi
          if [ -z "$GROQ_API_KEY" ]; then echo "❌ GROQ_API_KEY is empty"; else echo "✅ GROQ_API_KEY set (len=${#GROQ_API_KEY})"; fi
          if [ -z "$PINECONE_API_KEY" ]; then echo "❌ PINECONE_API_KEY is empty"; exit 1; else echo "✅ PINECONE_API_KEY set (len=${#PINECONE_API_KEY})"; fi
          echo "✅ PINECONE_INDEX_NAME=$PINECONE_INDEX_NAME"

      - name: Verify PDFs exist
        run: |
          echo "=== data/pdfs/ contents ==="
          ls -lah data/pdfs/ || echo "❌ data/pdfs/ missing"
          echo "=== PDF count ==="
          find data/pdfs/ -name "*.pdf" -type f | wc -l

      - name: Check if ingestion is needed
        id: state
        run: python scripts/check_ingestion_needed.py

      - name: Diagnostic — Show check result
        run: |
          echo "needed=${{ steps.state.outputs.needed }}"

      - name: Setup Pinecone index
        if: steps.state.outputs.needed == 'true'
        run: python scripts/04_setup_pinecone.py
        continue-on-error: true

      - name: Parse PDFs (text + images)
        id: parse
        if: steps.state.outputs.needed == 'true'
        run: python scripts/01_parse_pdfs.py
        continue-on-error: true

      - name: Diagnostic — Parse result
        if: always() && steps.state.outputs.needed == 'true'
        run: |
          echo "=== Parse outcome: ${{ steps.parse.outcome }} ==="
          ls -lah data/processed/ 2>/dev/null || echo "No processed dir"
          ls -lah public/extracted/ 2>/dev/null || echo "No extracted dir"
          find public/extracted/ -type f 2>/dev/null | head -20 || true

      - name: Describe images with Gemini Vision
        id: vision
        if: steps.state.outputs.needed == 'true' && steps.parse.outcome == 'success'
        run: python scripts/02_describe_images.py
        continue-on-error: true

      - name: Chunk, embed & upsert to Pinecone
        id: upsert
        if: steps.state.outputs.needed == 'true' && steps.parse.outcome == 'success'
        run: python scripts/03_chunk_embed_upsert.py
        continue-on-error: true

      - name: Run evaluation suite
        id: eval
        if: steps.state.outputs.needed == 'true' && steps.parse.outcome == 'success'
        run: python scripts/run_eval.py
        continue-on-error: true

      - name: Write ingestion state
        if: steps.state.outputs.needed == 'true' && steps.upsert.outcome == 'success'
        run: python scripts/write_ingestion_state.py

      - name: Diagnostic — Final artifact listing
        if: always() && steps.state.outputs.needed == 'true'
        run: |
          echo "=== Pipeline outcomes ==="
          echo "Parse: ${{ steps.parse.outcome }}"
          echo "Vision: ${{ steps.vision.outcome }}"
          echo "Upsert: ${{ steps.upsert.outcome }}"
          echo "Eval: ${{ steps.eval.outcome }}"
          echo "=== Artifacts ==="
          find public/extracted/ -type f 2>/dev/null | wc -l || true
          ls -lah eval/ 2>/dev/null || true

      - name: Commit & push artifacts
        if: always() && steps.state.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          mkdir -p public/extracted eval data
          git add public/extracted/ eval/results.json data/.ingestion_state.json

          echo "=== Git status ==="
          git status --short

          if git diff --cached --quiet; then
            echo "🟡 No artifact changes to commit..."
          else
            git commit -m "ci: auto-ingest lore, maps & eval metrics [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
